<!-- 🚀 FIM DO PIXEL DA META -->

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
}

/* 🔥 FIX MOBILE HEIGHT */
.page{
  width:100%;
  height:100svh;
  overflow:hidden;
  background:#000;
  color:#fff;
  display:flex;
  flex-direction:column;
}

/* 🔴 GRÁFICO */
.graph{
  width:100%;
  height:45vh;
  overflow:hidden;
  position:relative;
  z-index:2;
}

.graph img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center -85px;
  filter:brightness(.95) contrast(1.05);
}

/* FADE */
.graph::after{
  content:"";
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  height:90px;
  background:linear-gradient(to bottom, transparent, #000);
  z-index:3;
}

/* 🟢 VIDEO */
.confirmados{
  width:100%;
  height:32vh;
  overflow:hidden;
  position:relative;
  margin-top:-35px;
  z-index:1;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
}

.confirmados-box{
  width:100%;
  height:100%;
  overflow:hidden;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#000;
}

/* LABEL */
.label{
  position:absolute;
  top:10px;
  left:16px;
  z-index:5;
  padding:6px 11px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
  color:#58ff4b;
  background:rgba(0,0,0,.72);
  border:1px solid rgba(88,255,75,.4);
  box-shadow:0 0 10px rgba(88,255,75,.25);
}

/* ⚡ AÇÃO */
.action{
  width:100%;
  flex:1;
  padding:8px 14px 14px;
  display:flex;
  flex-direction:column;
  justify-content:space-evenly;
  align-items:center;
  text-align:center;
  background:
    radial-gradient(circle at top,rgba(255,115,0,.20),transparent 55%),
    linear-gradient(180deg,#050505,#000);
  z-index:4;
}

/* BONUS */
.bonus{
  width:100%;
  max-width:370px;
  padding:10px 12px;
  border-radius:14px;
  background:linear-gradient(90deg,#ff7a00,#ffc400);
  color:#111;
  font-size:14px;
  font-weight:1000;
  box-shadow:0 0 20px rgba(255,132,0,.65);
  animation:pulse 1.2s infinite;
}

@keyframes pulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.035);}
}

/* COPY */
.copy{
  font-size:13px;
  font-weight:800;
  color:#eee;
  line-height:1.25;
  max-width:360px;
}

/* BOTÕES */
.buttons{
  width:100%;
  max-width:370px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

/* BOTÃO */
.btn{
  height:48px;
  border-radius:14px;
  text-decoration:none;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12.5px;
  font-weight:1000;
  text-transform:uppercase;
}

/* PRINCIPAL */
.btn-main{
  color:#fff;
  background:linear-gradient(135deg,#ff2424,#ff8500);
  box-shadow:0 0 22px rgba(255,55,0,.75);
  animation:shake 2s infinite;
}

/* SECUNDÁRIO */
.btn-alt{
  color:#fff;
  background:rgba(255,255,255,.09);
  border:1px solid rgba(255,255,255,.25);
}

/* SHAKE */
@keyframes shake{
  0%,88%,100%{transform:translateX(0);}
  90%{transform:translateX(-2px);}
  92%{transform:translateX(2px);}
  94%{transform:translateX(-2px);}
  96%{transform:translateX(2px);}
}

/* 📱 MOBILE */
@media(max-height:700px){

  .graph{
    height:42vh;
  }

  .confirmados{
    height:30vh;
    margin-top:-30px;
  }

  .bonus{
    font-size:12px;
    padding:8px;
  }

  .copy{
    font-size:11.5px;
  }

  .btn{
    height:42px;
    font-size:11px;
  }
}
</style>

<body>

<div class="page">

      </a>

      <a href="https://media1.placard.co.mz/redirect.aspx?pid=10623&bid=1690" target="_blank" onclick="rastrearCadastro()" class="btn btn-alt">
        Bónus
      </a>
    </div>

  </div>

</div>

</body>
