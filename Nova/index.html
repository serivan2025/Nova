<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oferta</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
}

.page{
  width:100%;
  height:100vh;
  overflow:hidden;
  background:#000;
  color:#fff;
  display:flex;
  flex-direction:column;
}

/* TOPO - GRÁFICO */
.graph{
  width:100%;
  height:45vh;
  overflow:hidden;
  position:relative;
  z-index:2;
}

.graph img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center -85px;
  filter:brightness(.95) contrast(1.05);
}

.graph::after{
  content:"";
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  height:85px;
  background:linear-gradient(to bottom, transparent, #000);
  z-index:3;
}

/* CONFIRMADOS */
.confirmados{
  width:100%;
  height:34vh;
  overflow:hidden;
  position:relative;
  margin-top:-35px;
  z-index:1;
  padding:0;
  background:#000;
}

.confirmados-box{
  width:100%;
  height:100%;
  overflow:hidden;
  border:none;
  box-shadow:none;
  background:#000;
  position:relative;
}

.confirmados-box img{
  position:absolute;
  width:100%;
  height:auto;
  left:0;
  top:-55vh;
  filter:brightness(1.05) contrast(1.05);
}

.label{
  position:absolute;
  top:12px;
  left:14px;
  z-index:5;
  padding:6px 11px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
  color:#58ff4b;
  background:rgba(0,0,0,.72);
  border:1px solid rgba(88,255,75,.4);
  box-shadow:0 0 10px rgba(88,255,75,.25);
}

/* AÇÃO */
.action{
  width:100%;
  flex:1;
  min-height:0;
  padding:8px 14px 12px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  align-items:center;
  text-align:center;
  background:
    radial-gradient(circle at top,rgba(255,115,0,.20),transparent 55%),
    linear-gradient(180deg,#050505,#000);
  z-index:4;
}

.bonus{
  width:100%;
  max-width:370px;
  padding:9px 12px;
  border-radius:14px;
  background:linear-gradient(90deg,#ff7a00,#ffc400);
  color:#111;
  font-size:14px;
  font-weight:1000;
  box-shadow:0 0 20px rgba(255,132,0,.65);
  animation:pulse 1.2s infinite;
}

@keyframes pulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.035);}
}

.copy{
  font-size:13px;
  font-weight:800;
  color:#eee;
  line-height:1.25;
  max-width:360px;
}

.buttons{
  width:100%;
  max-width:370px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.btn{
  height:46px;
  border-radius:14px;
  text-decoration:none;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12.5px;
  font-weight:1000;
  text-transform:uppercase;
}

.btn-main{
  color:#fff;
  background:linear-gradient(135deg,#ff2424,#ff8500);
  box-shadow:0 0 22px rgba(255,55,0,.75);
  animation:shake 2s infinite;
}

.btn-alt{
  color:#fff;
  background:rgba(255,255,255,.09);
  border:1px solid rgba(255,255,255,.25);
}

@keyframes shake{
  0%,88%,100%{transform:translateX(0);}
  90%{transform:translateX(-2px);}
  92%{transform:translateX(2px);}
  94%{transform:translateX(-2px);}
  96%{transform:translateX(2px);}
}

/* TELAS BAIXAS */
@media(max-height:700px){
  .graph{
    height:43vh;
  }

  .graph img{
    object-position:center -35px;
  }

  .graph::after{
    height:75px;
  }

  .confirmados{
    height:35vh;
    margin-top:-32px;
  }

  .confirmados-box img{
    top:-46vh;
  }

  .bonus{
    font-size:12.5px;
    padding:7px 10px;
  }

  .copy{
    font-size:11.5px;
  }

  .btn{
    height:41px;
    font-size:11px;
  }
}

/* TELAS ALTAS */
@media(min-height:820px){
  .graph{
    height:46vh;
  }

  .graph img{
    object-position:center -55px;
  }

  .confirmados{
    height:33vh;
    margin-top:-42px;
  }

  .confirmados-box img{
    top:-49vh;
  }

  .action{
    padding-bottom:18px;
  }
}
</style>
</head>

<body>

<div class="page">

  <!-- GRÁFICO -->
  <div class="graph">
    <img src="Banner.png" alt="Gráfico">
  </div>

  <!-- CONFIRMADOS -->
  <div class="confirmados">
    <div class="confirmados-box">
      <div class="label">✓ Confirmados M-Pesa</div>
      <img src="Banner.png" alt="Confirmados M-Pesa">
    </div>
  </div>

  <!-- AÇÃO -->
  <div class="action">

    <div class="bonus">
      🎁 100% BÓNUS NO PRIMEIRO DEPÓSITO
    </div>

    <div class="copy">
      Regista agora, ativa a conta e aproveita antes que a oportunidade passe.
    </div>

    <div class="buttons">
      <a href="https://sshortly.net/2304f61" class="btn btn-main">Registar Agora</a>
      <a href="https://serivan2025.github.io/Golden_Time/" class="btn btn-alt">Sistema Cashout</a>
    </div>

  </div>

</div>

</body>
</html>
